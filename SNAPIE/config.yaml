# Converted from nextflow.config (initial scaffold).
genome: "hg19"
report_peak_genomic_annotation: true
fragle_ct_estimation: false
exclude_dac_regions: true
deduped_bam: true
outputFolder: "/date/gcb/gcb_MZ/SNAPIE2"
until: "BAM_SIGNAL_PROCESSING"
read_method: "PE"
trim_method: "FASTP"
containers:
  multiqc: "quay.io/biocontainers/multiqc:1.25.2--pyhdfd78af_0"
  bwa: "quay.io/biocontainers/bwa:0.7.18--he4a0461_1"
  samtools: "quay.io/biocontainers/samtools:1.15.1--h1170115_0"

# Paths to auxiliar programs (preserve relative paths)
pathEnrichmentScript: "auxiliar_programs/enrichment.sh"
pathRPileups: "auxiliar_programs/read_pileups.R"
pathSNPSMaSH: "auxiliar_programs/SMaSH.py"

# Samples / input 
samplesheet: /home/mattia/SNAPIE/config/samplesheet.csv
sample_dir_bam: null
 
# Paths
refdir: "/home/mattia/Genomes/hg19/"
genome_fa: "/home/mattia/Genomes/hg19/fa/bwa/hg19"
chrom_sizes: "/home/mattia/Genomes/hg19/hg19.chrom.sizes"
reads_dir: "reads"
controls_dir: "controls"
 
# Tool parameters (mirrors nextflow.config)
filter_samtools_pe_params: "-f 3 -F 3844 -q 30"
filter_samtools_se_params: "-F 3844 -q 30"
trimming_params: "--q 20"
trimming_params_fastp: "--adapter_sequence=AGATCGGAAGAGCACACGTCTGAACTCCAGTCA --adapter_sequence_r2=AGATCGGAAGAGCGTCGTGTAGGGAAAGAGTGT"
bwa_params: "-I 250,200,2000,10"
#deeptools
binsize: "10"
norm_method: "RPKM"
smooth_length: "300"

# Meta-coverage plots (cfChIP-seq Sadeh style: TSS + Enhancer panels)
pathMetaPlotScript: "auxiliar_programs/meta_plot_housekeeping.R"
pathMetaPlotR: "/home/mattia/cfChromatin_in_MS/cfChIP-seq_Sadeh/MetaPlot.R"
meta_genes_bed: "/date/gcb/gcb_MZ/Analysis/cfChIP-seq/SetupFiles/H3K27ac/Meta-genes.bed"
meta_enhancers_bed: "/date/gcb/gcb_MZ/Analysis/cfChIP-seq/SetupFiles/H3K27ac/Meta-enhancers.bed"
meta_plot_binsize: 25
